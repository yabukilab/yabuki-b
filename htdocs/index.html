<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>津田沼のおすすめカラオケ4選</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #F4D923; /* 背景色 */
            color: black; /* 文字色 */
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #00A599; /* 枠（ヘッダー） */
            color: black; /* 文字色 */
            padding: 15px;
            text-align: center;
            border: 5px solid #00A599;
        }
        section {
            margin: 20px;
            text-align: center;
            border: 3px solid #00A599; /* 各セクションの枠 */
            padding: 20px;
            border-radius: 10px;
        }
        .slideshow-container {
            position: relative;
            max-width: 600px;
            margin: auto;
        }
        .mySlides {
            display: none;
            width: 100%;
            border: 5px solid #00A599; /* スライドショーの画像枠 */
        }
        
        .next {
            right: 0;
            border-radius: 3px 0 0 3px;
        }
        .prev:hover, .next:hover {
            background-color: rgba(0, 165, 153, 1);
        }
        .dot {
            cursor: pointer;
            height: 15px;
            width: 15px;
            margin: 0 2px;
            background-color: #bbb;
            border-radius: 50%;
            display: inline-block;
            transition: background-color 0.6s ease;
        }
        .active, .dot:hover {
            background-color: #717171;
        }
        footer {
            margin-top: 40px;
            text-align: center;
            color: black;
        }
        a {
            color: #00A599;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<header>
    <h1>津田沼のおすすめhitok4選</h1>
</header>

<section>
    <div class="slideshow-container">
        <div class="mySlides">
            <img src="IMG_1152.jpg" alt="カラオケ1" style="width:100%">
        </div>
        <div class="mySlides">
            <img src="IMG_1153.jpg" alt="カラオケ2" style="width:100%">
        </div>
        <div class="mySlides">
            <img src="IMG_1154.jpg" alt="カラオケ3" style="width:100%">
        </div>
        <div class="mySlides">
            <img src="IMG_1273.jpg" alt="カラオケ4" style="width:100%">
        </div>

        <a class="prev" onclick="plusSlides(-1)">&#10094;</a>
        <a class="next" onclick="plusSlides(1)">&#10095;</a>
    </div>

    <br>

    <div style="text-align:center">
        <span class="dot" onclick="currentSlide(1)"></span> 
        <span class="dot" onclick="currentSlide(2)"></span> 
        <span class="dot" onclick="currentSlide(3)"></span> 
        <span class="dot" onclick="currentSlide(4)"></span> 
    </div>
</section>

<section>
    <h2>他のページへリンク</h2>
    <ul>
        <li><a href="page1.html">リンク1</a></li>
        <li><a href="page2.html">リンク2</a></li>
        <li><a href="page3.html">リンク3</a></li>
    </ul>
</section>

<footer>
    <p>© 2024 津田沼のおすすめカラオケ</p>
</footer>

<script>
    let slideIndex = 1;
    showSlides(slideIndex);

    function plusSlides(n) {
        showSlides(slideIndex += n);
    }

    function currentSlide(n) {
        showSlides(slideIndex = n);
    }

    function showSlides(n) {
        let i;
        let slides = document.getElementsByClassName("mySlides");
        let dots = document.getElementsByClassName("dot");
        if (n > slides.length) {slideIndex = 1}    
        if (n < 1) {slideIndex = slides.length}
        for (i = 0; i < slides.length; i++) {
            slides[i].style.display = "none";  
        }
        for (i = 0; i < dots.length; i++) {
            dots[i].className = dots[i].className.replace(" active", "");
        }
        slides[slideIndex-1].style.display = "block";  
        dots[slideIndex-1].className += " active";
    }
</script>

</body>
</html>
